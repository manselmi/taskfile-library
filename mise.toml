# vim: set ft=toml :


min_version = '2026.4.8'


[settings]
lockfile = true
lockfile_platforms = ['linux-arm64', 'linux-x64', 'macos-arm64']


[tasks.hooks-install]
hide = true
run = [{ task = 'hooks-uninstall' }, 'hk install --mise']

[tasks.hooks-uninstall]
env = { GIT_HOOKS_DIR = '.git/hooks' }
hide = true
run = [
  'mkdir -p -- "${GIT_HOOKS_DIR}"',
  'find -- "${GIT_HOOKS_DIR}" -mindepth 1 -delete',
]

[tasks.install]
run = ['mise install', { task = 'hooks-install' }]

[tasks.lint]
alias = 'default'
run = 'hk fix --all'

[tasks.upgrade]
depends = ['install']
env = { PKL = 'hk.pkl' }
run = """\
hk_ver() { mise tool --json -- hk | jq -r -- '.active_versions[]' | sort -r -V | head -n 1; } && \
hk_str() { printf '%s' "package://github.com/jdx/hk/releases/download/v${1}/hk@${1}"; } && \
OLD="$(hk_str "$(hk_ver)")" && \
mise upgrade --local && \
mise lock && \
NEW="$(hk_str "$(hk_ver)")" && \
sd -F -- "${OLD}" "${NEW}" "${PKL}";"""


[tools]
hk = 'latest'
jq = 'latest'
pkl = 'latest'
sd = 'latest'
