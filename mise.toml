# vim: set ft=toml :


min_version = '2026.5.6'


[hooks]
postinstall = [{ task = 'hooks-install' }]


[settings]
experimental = true
locked = true
lockfile = true
lockfile_platforms = ['linux-arm64', 'linux-x64', 'macos-arm64']
unix_default_file_shell_args = 'sh -euo pipefail'
unix_default_inline_shell_args = 'sh -euo pipefail -c'


[tasks.hooks-install]
hide = true
run = [{ task = 'hooks-uninstall' }, 'hk install --mise']

[tasks.hooks-uninstall]
hide = true
run = 'hk uninstall'

[tasks.lint]
alias = 'default'
run = 'hk fix --all'

[tasks.upgrade]
env.MISE_LOCKED = '0'
run = ['mise upgrade --local', 'mise lock']


[tools]
hk = 'latest'
pkl = 'latest'
